<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- TODO: Set the document title to the name of your application -->
  <title>SleekStamp | Premium Custom Wooden Stamps</title>
  <meta name="description"
    content="Premium custom wooden stamps - laser-engraved logos, eco-friendly, durable branding for your business." />
  <meta name="author" content="SleekStamp" />

  <!-- TODO: Update og:title to match your application name -->
  <meta property="og:title" content="SleekStamp | Premium Custom Wooden Stamps" />
  <meta property="og:description"
    content="Laser-engraved custom stamps for businesses and creators. Modern branding, eco-friendly design." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/og-image.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@SleekStamp" />
  <meta name="twitter:image" content="/og-image.png" />
</head>

<body>
  <!-- Splash screen: shown instantly by the browser before React/JS loads.
       Prevents Safari (and all browsers) from flashing intermediate loading states. -->
  <div id="splash" style="
    position: fixed; inset: 0; z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff;
    transition: opacity 0.3s ease-out;
  ">
    <div style="text-align: center;">
      <div style="
        width: 36px; height: 36px; margin: 0 auto 12px;
        border: 3px solid #e5e5e5; border-top-color: #Cca35a;
        border-radius: 50%; animation: sp 0.7s linear infinite;
      "></div>
      <div
        style="font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 18px; color: #1a1a1a; letter-spacing: -0.3px;">
        Sleek<span style="color: #Cca35a">Stamp</span>
      </div>
    </div>
  </div>
  <style>
    @keyframes sp {
      to {
        transform: rotate(360deg)
      }
    }
  </style>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
